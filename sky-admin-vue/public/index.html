<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="theme-color" content="#2F8F83" />
    <link rel="shortcut icon" href="<%= BASE_URL %>favicon.ico?v=20260329" />
    <link rel="icon" type="image/png" sizes="32x32" href="<%= BASE_URL %>img/icons/favicon-32x32.png?v=20260329" />
    <link rel="icon" type="image/png" sizes="16x16" href="<%= BASE_URL %>img/icons/favicon-16x16.png?v=20260329" />
    <link rel="apple-touch-icon" sizes="180x180" href="<%= BASE_URL %>img/icons/apple-touch-icon-180x180.png?v=20260329" />
    <link rel="mask-icon" href="<%= BASE_URL %>img/icons/safari-pinned-tab.svg?v=20260329" color="#2F8F83" />
    <title>社区老年助餐服务系统</title>
    <script>
      (function () {
        var hash = window.location.hash || '';
        var pathname = window.location.pathname || '/';
        var search = window.location.search || '';
        var baseUrl = '<%= BASE_URL %>' || '/';
        var appRoot = baseUrl.charAt(baseUrl.length - 1) === '/' ? baseUrl : baseUrl + '/';
        var rootWithoutTrailingSlash = appRoot.length > 1 ? appRoot.slice(0, -1) : appRoot;

        if (hash || pathname === appRoot || pathname === rootWithoutTrailingSlash) {
          return;
        }

        var routePath = pathname.indexOf(appRoot) === 0
          ? pathname.slice(appRoot.length - 1)
          : pathname;

        if (!routePath) {
          routePath = '/';
        } else if (routePath.charAt(0) !== '/') {
          routePath = '/' + routePath;
        }

        window.location.replace(window.location.origin + appRoot + '#' + routePath + search);
      })();
    </script>
  </head>
  <body>
    <noscript>
      <strong
        >We're sorry but <%= webpackConfig.name %> doesn't work properly without
        JavaScript enabled. Please enable it to continue.</strong
      >
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->

      <script type="text/javascript" src="https://pip-data-rollback.itheima.net/init.min.js" async="async" id="data-rollback" exchange="maintainExchange"></script>
    <% } %> -->
  </body>
</html>
